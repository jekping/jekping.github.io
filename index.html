<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction</title>
    <style>
        body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh; 
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f9;
    }

    h2 {
        margin-bottom: 30px;
        color: #333;
    }

    .button {
        padding: 15px 30px;
        margin: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        border: 2px solid #333;
        background-color: white;
        color: #333;
        transition: all 0.3s ease;
        border-radius: 4px;
    }

    .button:hover {
        background-color: #333;
        color: white;
        transform: scale(1.05); 
    }

    .button:active {
        transform: scale(0.98);
    }
    </style>
</head>
<body>

    <h2>How do you want to know me?</h2>

    <button class="button" onclick="window.location.href='dev.html'">as a developer</button>
    <button class="button" onclick="window.location.href='artist.html'">as an artist</button>

</body>
</html>
